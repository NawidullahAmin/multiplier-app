<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplier App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>Multiplier App</h1>
            <p>You can write any number in the below box and you will recieve the Multiplier for that number upto 10.</p>
        </div>
        <form class="content">
            <input type="number" id="num" placeholder="Type a number">
            <button id="btn">Good Luck!</button>
        </form>
        <div class="result"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
